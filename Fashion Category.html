<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apparel — Psy.market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: oklch(96% 0.014 75);
      --cream-mid: oklch(92% 0.020 73);
      --sand: oklch(87% 0.028 76);
      --dark: oklch(16% 0.020 55);
      --rust: oklch(57% 0.168 42);
      --rust-dim: oklch(51% 0.168 42);
      --text: oklch(20% 0.020 60);
      --text-mid: oklch(46% 0.016 65);
      --text-light: oklch(63% 0.013 68);
      --white: oklch(99% 0.005 75);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Manrope', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; }
    body::after { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='512' height='512' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E"); opacity: 0.03; pointer-events: none; z-index: 9999; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--cream); } ::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 3px; }
    select { appearance: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Data ─────────────────────────────────────────────────────
const ALL_PRODUCTS = [
  { id:1,  name: 'Fractal Geometry Hoodie', cat: 'Hoodies', price: 99,  seed: 'hoodie881', badge: 'Hot',      seller: "Ya'cxilan",      rating: 4.9, reviews: 84  },
  { id:2,  name: 'Sacred Geometry Tee',     cat: 'Tees',    price: 45,  seed: 'tee7722',   badge: null,        seller: 'DarkMysteryTribe', rating: 4.8, reviews: 52  },
  { id:3,  name: 'Psydelic Flow Jacket',    cat: 'Jackets', price: 135, seed: 'jacket9933', badge: 'New',      seller: 'CosmicThreads',  rating: 5.0, reviews: 31  },
  { id:4,  name: 'Cosmic Cargo Pants',      cat: 'Pants',   price: 72,  seed: 'cargo1244',  badge: null,       seller: 'Milad Wear',     rating: 4.7, reviews: 47  },
  { id:5,  name: 'Tribal Wrap Dress',       cat: 'Dresses', price: 88,  seed: 'dress7755',  badge: null,       seller: "Ya'cxilan",      rating: 4.9, reviews: 29  },
  { id:6,  name: 'UV Reactive Hoodie',      cat: 'Hoodies', price: 115, seed: 'uvhood6',    badge: 'Hot',      seller: 'FrequencyLab',   rating: 4.8, reviews: 63  },
  { id:7,  name: 'Festival Kimono',         cat: 'Dresses', price: 78,  seed: 'kimono7',    badge: null,       seller: 'NomadCraft',     rating: 4.6, reviews: 18  },
  { id:8,  name: 'Mandala Print Tee',       cat: 'Tees',    price: 38,  seed: 'mandalatee8', badge: null,      seller: 'TribeOfLight',   rating: 4.9, reviews: 91  },
  { id:9,  name: 'Flow Arts Leggings',      cat: 'Pants',   price: 65,  seed: 'leggings9',  badge: 'New',      seller: 'DarkMysteryTribe', rating: 4.7, reviews: 24 },
  { id:10, name: 'Shaman Cloak',            cat: 'Jackets', price: 185, seed: 'cloak10',    badge: 'Rare',     seller: "Ya'cxilan",      rating: 5.0, reviews: 12  },
  { id:11, name: 'Rave Crop Top',           cat: 'Tees',    price: 32,  seed: 'croptop11',  badge: null,       seller: 'CosmicThreads',  rating: 4.5, reviews: 37  },
  { id:12, name: 'Sacred Patchwork Jacket', cat: 'Jackets', price: 148, seed: 'patchjack12', badge: 'Handmade', seller: 'NomadCraft',    rating: 4.9, reviews: 43  },
  { id:13, name: 'Holographic Shorts',      cat: 'Pants',   price: 55,  seed: 'shorts13',   badge: null,       seller: 'Milad Wear',     rating: 4.6, reviews: 28  },
  { id:14, name: 'Boho Maxi Dress',         cat: 'Dresses', price: 96,  seed: 'maxi14',     badge: null,       seller: 'TribeOfLight',   rating: 4.8, reviews: 56  },
  { id:15, name: 'Geometric Bomber',        cat: 'Jackets', price: 160, seed: 'bomber15',   badge: 'New',      seller: 'FrequencyLab',   rating: 4.9, reviews: 19  },
  { id:16, name: 'Forest Spirit Hoodie',    cat: 'Hoodies', price: 108, seed: 'forest16',   badge: null,       seller: 'DarkMysteryTribe', rating: 4.7, reviews: 34 },
];

const SUBCATS = ['All', 'Hoodies', 'Tees', 'Jackets', 'Pants', 'Dresses'];
const SORT_OPTIONS = ['Featured', 'Price: Low to High', 'Price: High to Low', 'Top Rated', 'Newest'];
const PRICE_RANGES = ['Any Price', 'Under $50', '$50–$100', '$100–$200', '$200+'];

const badgeColors = { Hot: 'var(--rust)', New: '#5a7c4a', Rare: '#7a4a90', Handmade: '#8b6914' };

// ── Header ────────────────────────────────────────────────────
function Header() {
  const [query, setQuery] = useState('');
  const [focused, setFocused] = useState(false);
  const cats = ['Apparel', 'Art & Decor', 'Jewellery', 'Music', 'Tickets', 'Vintage', 'New Arrivals'];

  return (
    <div style={{ position: 'sticky', top: 0, zIndex: 1000 }}>
      <div style={{ background: '#000', borderBottom: '1px solid oklch(100% 0 0 / 0.12)' }}>
        <div style={{ maxWidth: '1320px', margin: '0 auto', padding: '0 40px', height: '120px', display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', gap: '24px' }}>
          <div><a href="Psy.market Homepage.html"><img src="logo.png" alt="psy.market" style={{ height: '62px', width: 'auto', display: 'block' }} /></a></div>
          <div style={{ width: '480px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', background: focused ? 'oklch(100% 0 0 / 0.12)' : 'oklch(100% 0 0 / 0.07)', border: `1px solid ${focused ? 'oklch(100% 0 0 / 0.35)' : 'oklch(100% 0 0 / 0.14)'}`, borderRadius: '8px', padding: '11px 16px', transition: 'all 0.25s' }}>
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" style={{ flexShrink: 0 }}><circle cx="6.5" cy="6.5" r="5" stroke="oklch(65% 0.01 70)" strokeWidth="1.4"/><line x1="10.5" y1="10.5" x2="13.5" y2="13.5" stroke="oklch(65% 0.01 70)" strokeWidth="1.4" strokeLinecap="round"/></svg>
              <input value={query} onChange={e => setQuery(e.target.value)} onFocus={() => setFocused(true)} onBlur={() => setFocused(false)} placeholder="Search apparel, art, gear, tickets…" style={{ border: 'none', outline: 'none', background: 'transparent', fontSize: '14px', color: 'white', width: '100%', fontFamily: 'Manrope' }} />
            </div>
          </div>
          <div style={{ display: 'flex', gap: '10px', justifyContent: 'flex-end' }}>
            <button style={{ background: 'transparent', border: '1px solid oklch(100% 0 0 / 0.22)', color: 'white', padding: '9px 20px', borderRadius: '7px', fontSize: '13px', cursor: 'pointer', fontFamily: 'Manrope' }}>Log In</button>
            <button style={{ background: 'var(--rust)', border: 'none', color: 'white', padding: '9px 22px', borderRadius: '7px', fontSize: '13px', cursor: 'pointer', fontWeight: 600, fontFamily: 'Manrope' }}>Sign Up</button>
          </div>
        </div>
      </div>
      <div style={{ height: '56px', background: 'oklch(15% 0.02 55)', borderBottom: '1px solid oklch(100% 0 0 / 0.09)' }}>
        <div style={{ maxWidth: '1320px', margin: '0 auto', padding: '0 40px', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '28px' }}>
          {cats.map(c => (
            <a key={c} href="#" style={{ color: c === 'Apparel' ? 'white' : 'oklch(68% 0.01 70)', fontSize: '13px', textDecoration: 'none', fontWeight: c === 'Apparel' ? 600 : 400, whiteSpace: 'nowrap', transition: 'color 0.2s', borderBottom: c === 'Apparel' ? '2px solid var(--rust)' : '2px solid transparent', paddingBottom: '2px' }}
              onMouseEnter={e => e.target.style.color = 'white'} onMouseLeave={e => e.target.style.color = c === 'Apparel' ? 'white' : 'oklch(68% 0.01 70)'}>{c}</a>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Product Card ──────────────────────────────────────────────
function ProductCard({ item }) {
  const [hov, setHov] = useState(false);
  const [wishlisted, setWishlisted] = useState(false);

  return (
    <div style={{ background: 'var(--white)', borderRadius: '10px', overflow: 'hidden', border: '1px solid var(--sand)', cursor: 'pointer', display: 'flex', flexDirection: 'column', boxShadow: hov ? '0 12px 36px oklch(35% 0.06 55 / 0.14)' : '0 2px 8px oklch(0% 0 0 / 0.06)', transform: hov ? 'translateY(-4px)' : 'none', transition: 'all 0.3s ease' }}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}>
      <div style={{ position: 'relative', overflow: 'hidden' }}>
        <img src={`https://picsum.photos/seed/${item.seed}/480/520`} style={{ width: '100%', height: '260px', objectFit: 'cover', display: 'block', transition: 'transform 0.5s', transform: hov ? 'scale(1.05)' : 'scale(1)' }} alt={item.name} />
        {item.badge && <span style={{ position: 'absolute', top: '10px', left: '10px', background: badgeColors[item.badge] || 'var(--rust)', color: 'white', fontSize: '9px', padding: '3px 8px', borderRadius: '3px', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase' }}>{item.badge}</span>}
        <button onClick={e => { e.stopPropagation(); setWishlisted(w => !w); }} style={{ position: 'absolute', top: '10px', right: '10px', background: wishlisted ? 'var(--rust)' : 'oklch(100% 0 0 / 0.85)', border: 'none', width: '32px', height: '32px', borderRadius: '50%', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.2s', backdropFilter: 'blur(4px)' }}>
          <svg width="14" height="13" viewBox="0 0 14 13" fill={wishlisted ? 'white' : 'none'} stroke={wishlisted ? 'none' : 'var(--text-mid)'} strokeWidth="1.5"><path d="M7 12S1 7.5 1 4a3 3 0 0 1 6 0 3 3 0 0 1 6 0c0 3.5-6 8-6 8z"/></svg>
        </button>
        {hov && <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '12px', background: 'linear-gradient(to top, oklch(0% 0 0 / 0.5), transparent)' }}>
          <button style={{ width: '100%', background: 'white', border: 'none', padding: '9px', borderRadius: '6px', fontSize: '12px', fontWeight: 700, cursor: 'pointer', fontFamily: 'Manrope', letterSpacing: '0.04em', color: 'var(--dark)' }}>ADD TO CART</button>
        </div>}
      </div>
      <div style={{ padding: '13px 14px 15px', flex: 1, display: 'flex', flexDirection: 'column', gap: '4px' }}>
        <p style={{ fontSize: '10px', color: 'var(--text-light)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>{item.cat}</p>
        <p style={{ fontSize: '14px', fontWeight: 500, color: 'var(--text)', lineHeight: 1.3, flex: 1 }}>{item.name}</p>
        <div style={{ display: 'flex', alignItems: 'center', gap: '5px', marginTop: '2px' }}>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="var(--rust)"><path d="M5 0l1.1 3.4H9.5L6.7 5.5l1.1 3.4L5 7l-2.8 1.9 1.1-3.4L.5 3.4H3.9z"/></svg>
          <span style={{ fontSize: '11px', color: 'var(--text-light)' }}>{item.rating} ({item.reviews})</span>
          <span style={{ fontSize: '11px', color: 'var(--text-light)', marginLeft: 'auto' }}>by <span style={{ color: 'var(--rust)' }}>{item.seller}</span></span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: '6px' }}>
          <span style={{ fontFamily: 'Bricolage Grotesque', fontSize: '18px', fontWeight: 700, color: 'var(--rust)' }}>${item.price}</span>
        </div>
      </div>
    </div>
  );
}

// ── Main Page ─────────────────────────────────────────────────
function CategoryPage() {
  const [subcat, setSubcat] = useState('All');
  const [sort, setSort] = useState('Featured');
  const [priceRange, setPriceRange] = useState('Any Price');
  const [gridCols, setGridCols] = useState(4);
  const [showFilters, setShowFilters] = useState(false);

  const filtered = ALL_PRODUCTS.filter(p => {
    if (subcat !== 'All' && p.cat !== subcat) return false;
    if (priceRange === 'Under $50' && p.price >= 50) return false;
    if (priceRange === '$50–$100' && (p.price < 50 || p.price > 100)) return false;
    if (priceRange === '$100–$200' && (p.price < 100 || p.price > 200)) return false;
    if (priceRange === '$200+' && p.price < 200) return false;
    return true;
  }).sort((a, b) => {
    if (sort === 'Price: Low to High') return a.price - b.price;
    if (sort === 'Price: High to Low') return b.price - a.price;
    if (sort === 'Top Rated') return b.rating - a.rating;
    return 0;
  });

  const activeFilters = [
    subcat !== 'All' && subcat,
    priceRange !== 'Any Price' && priceRange,
  ].filter(Boolean);

  return (
    <div style={{ background: 'var(--cream)', minHeight: '100vh' }}>
      <Header />

      {/* ── Category banner ── */}
      <div style={{ background: 'var(--dark)', padding: '36px 0' }}>
        <div style={{ maxWidth: '1320px', margin: '0 auto', padding: '0 40px' }}>
          <p style={{ fontSize: '11px', color: 'oklch(55% 0.01 70)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: '8px' }}>
            <a href="Psy.market Homepage.html" style={{ color: 'oklch(55% 0.01 70)', textDecoration: 'none' }}>Home</a> → Apparel
          </p>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between' }}>
            <div>
              <h1 style={{ fontFamily: 'Bricolage Grotesque', fontSize: '42px', fontWeight: 700, color: 'white', letterSpacing: '-0.04em', lineHeight: 1 }}>Festival Fashion</h1>
              <p style={{ fontSize: '14px', color: 'oklch(58% 0.01 70)', marginTop: '8px' }}>{ALL_PRODUCTS.length} items from independent creators worldwide</p>
            </div>
            {/* Sub-category pills */}
            <div style={{ display: 'flex', gap: '8px' }}>
              {SUBCATS.map(s => (
                <button key={s} onClick={() => setSubcat(s)} style={{ padding: '7px 16px', borderRadius: '20px', fontSize: '12px', cursor: 'pointer', fontFamily: 'Manrope', fontWeight: 500, transition: 'all 0.2s', background: subcat === s ? 'var(--rust)' : 'oklch(100% 0 0 / 0.08)', border: `1px solid ${subcat === s ? 'var(--rust)' : 'oklch(100% 0 0 / 0.18)'}`, color: 'white' }}>{s}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* ── Filter bar ── */}
      <div style={{ background: 'var(--white)', borderBottom: '1px solid var(--sand)', position: 'sticky', top: '176px', zIndex: 100 }}>
        <div style={{ maxWidth: '1320px', margin: '0 auto', padding: '0 40px', height: '52px', display: 'flex', alignItems: 'center', gap: '16px' }}>
          {/* Sort */}
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexShrink: 0 }}>
            <span style={{ fontSize: '12px', color: 'var(--text-light)', letterSpacing: '0.04em', textTransform: 'uppercase' }}>Sort</span>
            <div style={{ position: 'relative' }}>
              <select value={sort} onChange={e => setSort(e.target.value)} style={{ background: 'transparent', border: '1px solid var(--sand)', borderRadius: '6px', padding: '5px 28px 5px 10px', fontSize: '13px', color: 'var(--text)', fontFamily: 'Manrope', cursor: 'pointer', outline: 'none' }}>
                {SORT_OPTIONS.map(o => <option key={o}>{o}</option>)}
              </select>
              <svg style={{ position: 'absolute', right: '8px', top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none' }} width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="var(--text-light)" strokeWidth="1.5" fill="none" strokeLinecap="round"/></svg>
            </div>
          </div>

          <div style={{ width: '1px', height: '20px', background: 'var(--sand)' }}></div>

          {/* Price */}
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexShrink: 0 }}>
            <span style={{ fontSize: '12px', color: 'var(--text-light)', letterSpacing: '0.04em', textTransform: 'uppercase' }}>Price</span>
            <div style={{ display: 'flex', gap: '6px' }}>
              {PRICE_RANGES.map(r => (
                <button key={r} onClick={() => setPriceRange(r)} style={{ padding: '4px 12px', borderRadius: '5px', fontSize: '12px', cursor: 'pointer', fontFamily: 'Manrope', transition: 'all 0.2s', background: priceRange === r ? 'var(--dark)' : 'transparent', border: `1px solid ${priceRange === r ? 'var(--dark)' : 'var(--sand)'}`, color: priceRange === r ? 'white' : 'var(--text-mid)' }}>{r}</button>
              ))}
            </div>
          </div>

          <div style={{ flex: 1 }}></div>

          {/* Active filters */}
          {activeFilters.length > 0 && (
            <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
              {activeFilters.map(f => (
                <span key={f} style={{ display: 'flex', alignItems: 'center', gap: '5px', background: 'oklch(92% 0.04 55)', border: '1px solid oklch(82% 0.06 55)', borderRadius: '4px', padding: '3px 8px', fontSize: '11px', color: 'var(--rust)', fontWeight: 600 }}>
                  {f}
                  <button onClick={() => { if (SUBCATS.includes(f)) setSubcat('All'); else setPriceRange('Any Price'); }} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--rust)', fontSize: '14px', lineHeight: 1, padding: '0' }}>×</button>
                </span>
              ))}
              <button onClick={() => { setSubcat('All'); setPriceRange('Any Price'); }} style={{ fontSize: '11px', color: 'var(--text-light)', background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline' }}>Clear all</button>
            </div>
          )}

          {/* Result count + grid toggle */}
          <div style={{ display: 'flex', alignItems: 'center', gap: '12px', flexShrink: 0 }}>
            <span style={{ fontSize: '12px', color: 'var(--text-light)' }}>{filtered.length} results</span>
            <div style={{ display: 'flex', gap: '4px' }}>
              {[4, 3].map(n => (
                <button key={n} onClick={() => setGridCols(n)} style={{ width: '28px', height: '28px', borderRadius: '5px', border: `1px solid ${gridCols === n ? 'var(--dark)' : 'var(--sand)'}`, background: gridCols === n ? 'var(--dark)' : 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '2px' }}>
                  {Array.from({ length: n === 4 ? 4 : 3 }).map((_, i) => <div key={i} style={{ width: '3px', height: '12px', background: gridCols === n ? 'white' : 'var(--sand)', borderRadius: '1px' }}></div>)}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* ── Product Grid ── */}
      <div style={{ maxWidth: '1320px', margin: '0 auto', padding: '40px 40px 80px' }}>
        {filtered.length === 0 ? (
          <div style={{ textAlign: 'center', padding: '80px 0', color: 'var(--text-light)' }}>
            <p style={{ fontFamily: 'Bricolage Grotesque', fontSize: '24px', marginBottom: '8px' }}>No items found</p>
            <p style={{ fontSize: '14px' }}>Try adjusting your filters</p>
          </div>
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${gridCols}, 1fr)`, gap: '20px' }}>
            {filtered.map(item => <ProductCard key={item.id} item={item} />)}
          </div>
        )}

        {/* Load more */}
        {filtered.length > 0 && (
          <div style={{ textAlign: 'center', marginTop: '56px' }}>
            <button style={{ background: 'transparent', border: '1.5px solid var(--dark)', color: 'var(--dark)', padding: '13px 40px', borderRadius: '8px', fontSize: '14px', fontWeight: 600, cursor: 'pointer', fontFamily: 'Manrope', letterSpacing: '0.02em', transition: 'all 0.2s' }}
              onMouseEnter={e => { e.target.style.background = 'var(--dark)'; e.target.style.color = 'white'; }}
              onMouseLeave={e => { e.target.style.background = 'transparent'; e.target.style.color = 'var(--dark)'; }}>
              Load More
            </button>
          </div>
        )}
      </div>

      {/* ── Footer ── */}
      <footer style={{ background: '#000', borderTop: '1px solid oklch(100% 0 0 / 0.1)' }}>
        <div style={{ maxWidth: '1320px', margin: '0 auto', padding: '56px 40px 28px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', gap: '48px', marginBottom: '48px' }}>
            <div>
              <img src="logo.png" alt="psy.market" style={{ height: '48px', width: 'auto', display: 'block', marginBottom: '14px' }} />
              <p style={{ fontSize: '13px', color: 'oklch(56% 0.01 70)', lineHeight: 1.8, maxWidth: '260px' }}>The global marketplace for the psytrance and festival community worldwide.</p>
            </div>
            {[{ title: 'Shop', links: ['Apparel', 'Art & Decor', 'Jewellery', 'Music', 'Tickets'] }, { title: 'Support', links: ['Help Center', 'Selling Guide', 'Returns', 'Community'] }, { title: 'Company', links: ['About Us', 'Blog', 'Careers', 'Press'] }].map(col => (
              <div key={col.title}>
                <p style={{ fontSize: '11px', fontWeight: 700, color: 'white', marginBottom: '16px', letterSpacing: '0.07em', textTransform: 'uppercase' }}>{col.title}</p>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                  {col.links.map(l => <a key={l} href="#" style={{ fontSize: '13px', color: 'oklch(52% 0.01 70)', textDecoration: 'none' }}>{l}</a>)}
                </div>
              </div>
            ))}
          </div>
          <div style={{ borderTop: '1px solid oklch(100% 0 0 / 0.07)', paddingTop: '22px', display: 'flex', justifyContent: 'space-between' }}>
            <p style={{ fontSize: '12px', color: 'oklch(40% 0.01 70)' }}>© 2025 Psy.Market. All rights reserved.</p>
            <div style={{ display: 'flex', gap: '24px' }}>
              {['Privacy', 'Terms', 'Cookies'].map(l => <a key={l} href="#" style={{ fontSize: '12px', color: 'oklch(40% 0.01 70)', textDecoration: 'none' }}>{l}</a>)}
            </div>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CategoryPage />);
</script>
</body>
</html>
